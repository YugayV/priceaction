
# Nixpacks configuration for Railway deployment
[phases.setup]
nixPkgs = ["...", "python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]
dependsOn = ["setup"]

[phases.build]
dependsOn = ["install"]

[start]
cmd = "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
dependsOn = ["build"]
